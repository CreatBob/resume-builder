# author: jf
name: Deploy Spring AI

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: production-deploy
  cancel-in-progress: false

jobs:
  build-check:
    name: Build Check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build frontend
        run: npm run build

  deploy:
    name: Deploy
    needs: build-check
    runs-on: ubuntu-latest
    environment: production
    env:
      DEPLOY_BRANCH: main
      DEPLOY_PROFILE: spring-ai
    steps:
      - name: Deploy on server
        env:
          SERVER_HOST: ${{ secrets.SERVER_HOST }}
          SERVER_USER: ${{ secrets.SERVER_USER }}
          SERVER_SSH_KEY: ${{ secrets.SERVER_SSH_KEY }}
          SERVER_SSH_PORT: ${{ secrets.SERVER_SSH_PORT }}
          DEPLOY_PATH: ${{ secrets.DEPLOY_PATH }}
        run: |
          set -euo pipefail

          : "${SERVER_HOST:?SERVER_HOST secret is required}"
          : "${SERVER_USER:?SERVER_USER secret is required}"
          : "${SERVER_SSH_KEY:?SERVER_SSH_KEY secret is required}"
          : "${DEPLOY_PATH:?DEPLOY_PATH secret is required}"

          SSH_PORT="${SERVER_SSH_PORT:-22}"
          mkdir -p ~/.ssh
          printf '%s\n' "$SERVER_SSH_KEY" > ~/.ssh/resume_builder_deploy_key
          chmod 600 ~/.ssh/resume_builder_deploy_key
          ssh-keyscan -p "$SSH_PORT" "$SERVER_HOST" >> ~/.ssh/known_hosts

          ssh -i ~/.ssh/resume_builder_deploy_key -p "$SSH_PORT" "$SERVER_USER@$SERVER_HOST" \
            "DEPLOY_PATH='$DEPLOY_PATH' DEPLOY_BRANCH='$DEPLOY_BRANCH' DEPLOY_PROFILE='$DEPLOY_PROFILE' bash -s" <<'EOSSH'
          set -euo pipefail

          cd "$DEPLOY_PATH"
          test -f .env

          git fetch origin "$DEPLOY_BRANCH"
          git checkout "$DEPLOY_BRANCH"
          git pull --ff-only origin "$DEPLOY_BRANCH"

          docker compose down
          docker compose --profile "$DEPLOY_PROFILE" up --build -d
          docker compose --profile "$DEPLOY_PROFILE" ps
          EOSSH
